<div class="title">
    <h3>Songs You Might Like</h3>
</div>
<div class="suggestions">
    <app-song-cube *ngFor="let item of songs | slice:SuggestionsStart:SuggestionsEnd" [song]="item"></app-song-cube>
</div>
<div class="navigation">
    <button *ngIf="this.SuggestionsStart != 0" (click)="goTo(Back)">
        <img class="svg" src="../../../assets/icons/chevrons-left.svg" alt="">
    </button>
    
    <button *ngIf="this.SuggestionsEnd + 16 < this.songs.length" (click)="goTo(Next)">
        <img class="svg" src="../../../assets/icons/chevrons-right.svg" alt="">
    </button>
</div>
