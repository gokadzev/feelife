<h3 class="title">{{ 'Recently Played' | translate }}</h3>
<div class="recent">
  <app-song-cube *ngFor="let item of recentSongs | slice:GlobalStart:GlobalEnd" [song]="item"></app-song-cube>
</div>
<div class="navigation">
  <button *ngIf="this.GlobalStart > 0" (click)="goTo('Back')">
    <img class="svg" src="assets/icons/chevrons-left.svg" alt="">
  </button>
  <button *ngIf="this.GlobalStart == 0">
  </button>

  <button *ngIf="this.GlobalEnd + 16 < this.recentSongs.length" (click)="goTo('Next')">
    <img class="svg" src="assets/icons/chevrons-right.svg" alt="">
  </button>
</div>
