<div class="title">
<h3>Global Top 50</h3>
<button (click)="showTopGlobalMore()">
    <img class="svg" *ngIf="this.GlobalEndExpanded == false" src="../../../assets/icons/more.svg" alt="">
    <img class="svg" *ngIf="this.GlobalEndExpanded == true" src="../../../assets/icons/x.svg" alt="">
</button>
</div>
<div class="global50">
    <app-song-cube *ngFor="let item of songs | slice:0:GlobalEnd" [song]="item"></app-song-cube>
</div>

<div class="title">
<h3>Songs You Might Like</h3>
<button (click)="showSuggestionsMore()">
    <img class="svg" *ngIf="this.SuggestionsEndExpanded == false" src="../../../assets/icons/more.svg" alt="">
    <img class="svg" *ngIf="this.SuggestionsEndExpanded == true" src="../../../assets/icons/x.svg" alt="">
</button>
</div>

<div class="suggestions">
    <app-song-cube *ngFor="let item of songs | slice:0:SuggestionsEnd" [song]="item"></app-song-cube>
</div>

<h3>Recently Played</h3>

<div class="recently">
    <app-song *ngFor="let item of songs | slice:0:10" [song]="item"></app-song>
</div>
