<div class="components">
  <aside class="left">
    <div class="logo">
      <!-- <a href="./"><img src="../assets/images/logo.jpg" alt=""></a> -->
    </div>
    <div class="tabs">
      <h1>MENU</h1>
      <div class="tab">
        <a href="./"><img src="../assets/icons/home.svg" alt=""> <p>Home</p> </a>
      </div>
      <div class="tab">
        <a href="./search"><img src="../assets/icons/search.svg" alt=""> <p>Search</p> </a>
      </div>
      <div class="tab">
        <a href="./discover"><img src="../assets/icons/discover.svg" alt=""><p>Discover</p> </a>
      </div>
      <div class="tab">
        <a href="./albums"><img src="../assets/icons/album.svg" alt=""> <p>Albums</p> </a>
      </div>
      <div class="tab">
        <a href="./artists"><img src="../assets/icons/artist.svg" alt=""><p>Artists</p> </a>
      </div>
    </div>
    <div class="tabs">
      <h1>LIBRARY</h1>
      <div class="tab">
        <a href="./recent"><img src="../assets/icons/recent.svg" alt=""><p>Recent</p> </a>
      </div>
      <div class="tab">
        <a href="./favourites"><img src="../assets/icons/heart.svg" alt=""><p>Favourites</p> </a>
      </div>
    </div>
    <div class="tabs">
      <h1>PLAYLIST</h1>
    </div>
    <div class="tabs">
      <h1>GENERAL</h1>
      <div class="tab">
        <a href="./settings"><img src="../assets/icons/settings.svg" alt=""><p>Settings</p> </a>
      </div>
      <div class="tab">
        <a href="./logout"><img src="../assets/icons/exit.svg" alt=""><p>Log Out</p> </a>
      </div>
    </div>
  </aside>
  <aside class="center">
    <router-outlet></router-outlet>
  </aside>
  <aside class="right">
    <div class="feature tabs">
      <h1>NOTIFICATIONS</h1>
      <div class="notifications">
        <div class="notification">
          <img src="../assets/icons/added.svg" alt="">
          <div class="notifInfo">
            <h3>Songs Added</h3>
            <p *ngIf="this.songs != undefined">{{ songs.length }}</p>
          </div>
        </div>
      </div>
    </div>
    <div class="feature tabs">
      <h1>TOP ARTISTS</h1>
      <div class="artists-list">
        <app-artist *ngFor="let item of singers | slice:0:6" [singer]="item"></app-artist>
      </div>
    </div>

    <div class="player">
      <h1>NOW PLAYING</h1>
      <div class="songInfo">
        <img [src]="activeSong?.coverphoto" alt="">
        <h3 class="singer">{{ activeSong?.singer }}</h3>
        <p class="song">{{ activeSong?.songtitle }}</p>
      </div>

      <div class="col-12">
        <div class="container">
            <div class="row row1">
              <div class="col-6 text-left">
                {{ currentTime$ | async }}
              </div>
            <div class="progress-bar bg-info" role="progressbar"
            [ngStyle]="{'width': (currentProgress$ | async) + '%'}"
            [attr.aria-valuenow]="(currentProgress$ | async) "
            aria-valuemin="0" aria-valuemax="100"></div>
            <div class="col-6 text-right" *ngIf="player?.duration">
              {{ durationTime }}
            </div>
            </div>
          </div>
  
          <table class="playerControllers">
            <button class="addFunc" (click)="shuffleChange()"><img src="../assets/icons/shuffle.svg" alt=""></button>
            <td><button type="button" class="btn btn-outline-dark" (click)="playPreviousSong()"><img src="../assets/icons/skip-back.svg" alt=""></button></td>
    
            <td [style.width]="isPlaying == true ? '72px' : '0px'" [style.display]="isPlaying == true ? 'table-cell' : 'none'"><button type="button" class="btn btn-outline-dark ppcontrol" *ngIf="isPlaying" (click)="player.pause()"><img src="../assets/icons/pauze.svg" alt=""></button></td>
            <td [style.width]="isPlaying == false ? '72px' : '0px'" [style.display]="isPlaying == false ? 'table-cell' : 'none'"><button type="button" class="btn btn-outline-dark ppcontrol" *ngIf="!isPlaying" (click)="playSong(activeSong)"><img src="../assets/icons/play.svg" alt=""></button></td>
      
            <td><button type="button" class="btn btn-outline-dark" (click)="playNextSong()"><img src="../assets/icons/skip-forward.svg" alt=""></button></td>
            <button class="addFunc" (click)="repeatChange()"><img src="../assets/icons/repeat.svg" alt=""></button>
          </table>
      </div>


      <audio #player
      (timeupdate)="onTimeUpdate()"
      (pause)="onPause()"></audio>


    </div>

  </aside>
</div>
